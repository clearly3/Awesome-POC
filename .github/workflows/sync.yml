name: Sync from Threekiii/Awesome-POC

on:
  schedule:
    # 每天北京时间 8 点和 20 点各同步一次
    - cron: '0 0,12 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add upstream
        run: git remote add upstream https://github.com/Threekiii/Awesome-POC.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream/main into your main
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories -m "Sync from upstream"

      - name: Push to your fork
        run: git push origin main
